{% extends 'catalog/base.html' %}
{% block  content %}
<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
    {% for obj in object_list %}
    <div class="col">

        <div class="card shadow-sm">
            <div class="card-body">

                <p class="card-text">{{ obj.name }}</p>
                <p class="card-text">{{ obj.description }}</p>

            </div>
        </div>

    </div>
    {% endfor %}
</div>
{% endblock %}
